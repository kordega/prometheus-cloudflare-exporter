name: Lint and Test Charts

on: pull_request

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm CLI
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Set up Python runtime
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install chart-testing tool
        uses: helm/chart-testing-action@v2.8.0

      - name: Detect changed Helm charts
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch master)
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Lint Helm charts
        run: ct lint --target-branch master

      - name: Create kind cluster
        uses: helm/kind-action@v1.13.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Test Helm chart installation
        run: ct install --target-branch master
